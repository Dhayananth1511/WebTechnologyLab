<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="game">
        <div class="header">
            <h1 class="title">Rock Paper Scissors</h1>
            <p class="subtitle">First player to reach 10 points wins the match.</p>
        </div>

        <div class="score-row">
            <div class="score-card">
                <span class="score-label">You</span>
                <span class="score-value" id="userScore">0</span>
            </div>
            <div class="center-chip">VS</div>
            <div class="score-card">
                <span class="score-label">Computer</span>
                <span class="score-value" id="cpuScore">0</span>
            </div>
        </div>

        <div class="progress-wrap" aria-label="Game progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="arena">
            <div class="versus" id="arenaBox">
                <div class="choice-box">
                    <div class="emoji" id="userEmoji">❔</div>
                    <div class="choice-name" id="userChoiceLabel">Your choice</div>
                </div>
                <div class="vs">VS</div>
                <div class="choice-box">
                    <div class="emoji" id="cpuEmoji">❔</div>
                    <div class="choice-name" id="cpuChoiceLabel">Computer</div>
                </div>
            </div>

            <p class="status subtle" id="statusMsg">Choose rock, paper, or scissors.</p>

            <div class="controls" id="choiceButtons">
                <button class="choice-btn" onclick="play('rock')">✊ Rock</button>
                <button class="choice-btn" onclick="play('paper')">✋ Paper</button>
                <button class="choice-btn" onclick="play('scissors')">✌ Scissors</button>
            </div>

            <div class="input-row">
                <input id="input" placeholder="Type rock, paper, or scissors" />
                <button class="play-btn" onclick="playFromInput()">Play</button>
            </div>

            <div class="error" id="error"></div>

            <div class="footer-row">
                <button class="reset-btn" onclick="resetGame()">Reset Game</button>
            </div>

            <div class="winner-banner" id="winnerBanner"></div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
